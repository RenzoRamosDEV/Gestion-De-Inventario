version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: inventario-db
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: inventario
      MYSQL_USER: inventario_user
      MYSQL_PASSWORD: inventario_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - inventario-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build: .
    container_name: inventario-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: inventario
      DB_USERNAME: inventario_user
      DB_PASSWORD: inventario_pass
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - inventario-network
    restart: unless-stopped

  frontend:
    build: ../frontend
    container_name: inventario-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - inventario-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  inventario-network:
    driver: bridge