# Configuración del perfil de producción
spring.profiles.active=prod

# Configuración de la base de datos (producción)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:inventario}
spring.datasource.username=${DB_USERNAME:inventario_user}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración JPA para producción
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false

# Pool de conexiones optimizado para producción
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Configuración del servidor
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# Configuración de logs para producción
logging.level.org.service_entity=WARN
logging.level.root=ERROR
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Jackson configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Configuración de seguridad
server.error.include-stacktrace=never
server.error.include-message=never